<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Climate Attractor</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #08080e;
      color: #9090a8;
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }
    .code {
      font-size: clamp(4rem, 15vw, 8rem);
      font-weight: 500;
      color: #1a1a2e;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .message {
      font-size: 13px;
      letter-spacing: 0.12em;
      color: #505068;
    }
    .sub {
      font-size: 11px;
      color: #383850;
      max-width: 320px;
      line-height: 1.8;
    }
    a {
      color: #4fc3f7;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.08em;
      border-bottom: 1px solid rgba(79,195,247,0.3);
      padding-bottom: 2px;
      margin-top: 16px;
      display: inline-block;
      transition: border-color 200ms;
    }
    a:hover { border-color: #4fc3f7; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <div class="message">THIS PAGE LEFT THE ATTRACTOR</div>
  <div class="sub">
    The page you're looking for has drifted outside
    the natural variability envelope.
  </div>
  <a href="/">Return to the visualization →</a>
</body>
</html>
