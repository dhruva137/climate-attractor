<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { width:1200px; height:630px; overflow:hidden; background:#08080e; font-family:'Inter',system-ui,sans-serif; }
    .container { position:relative; width:1200px; height:630px; display:flex; align-items:center; justify-content:center; }
    svg.orbit { position:absolute; inset:0; width:100%; height:100%; }
    .content { position:relative; z-index:2; text-align:center; }
    h1 { color:#f0f0f0; font-size:64px; font-weight:600; letter-spacing:-0.03em; line-height:1.0; margin-bottom:16px; }
    .sub { color:#9090a8; font-size:20px; font-family:'JetBrains Mono',monospace; letter-spacing:0.1em; margin-bottom:40px; }
    .stats { display:flex; gap:48px; justify-content:center; }
    .stat-value { color:#4fc3f7; font-size:32px; font-weight:600; font-family:'JetBrains Mono',monospace; }
    .stat-label { color:#505068; font-size:11px; letter-spacing:0.15em; text-transform:uppercase; font-family:'JetBrains Mono',monospace; margin-top:4px; }
    .stat-div { width:1px; height:48px; background:rgba(255,255,255,0.08); align-self:center; }
    .brand { position:absolute; bottom:24px; left:50%; transform:translateX(-50%); color:#383850; font-size:11px; font-family:'JetBrains Mono',monospace; letter-spacing:0.1em; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <svg class="orbit" viewBox="0 0 1200 630">
      <defs>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <path d="M200,420 C250,380 280,320 310,280 C340,240 360,200 400,180 C440,160 500,240 540,300 C580,360 600,420 560,440 C520,460 460,400 420,340 C380,280 360,220 390,180 C420,140 480,200 530,260 C580,320 640,400 700,380 C760,360 800,280 820,230 C840,180 880,160 920,200 C960,240 980,320 1000,280"
            fill="none" stroke="rgba(129,140,248,0.25)" stroke-width="2" filter="url(#glow)"/>
      <path d="M200,420 C250,380 280,320 310,280 C340,240 360,200 400,180 C440,160 500,240 540,300 C580,360 600,420 560,440 C520,460 460,400 420,340 C380,280 360,220 390,180 C420,140 480,200 530,260 C580,320 640,400 700,380 C760,360 800,280 820,230 C840,180 880,160 920,200 C960,240 980,320 1000,280"
            fill="none" stroke="rgba(129,140,248,0.08)" stroke-width="8"/>
      <!-- modern breakout -->
      <path d="M1000,280 C1020,250 1040,200 1060,160" fill="none" stroke="rgba(255,68,68,0.7)" stroke-width="3" filter="url(#glow)"/>
      <circle cx="1060" cy="160" r="5" fill="#ff4444"/>
      <circle cx="1060" cy="160" r="12" fill="none" stroke="rgba(255,68,68,0.3)" stroke-width="1"/>
    </svg>
    <div class="content">
      <h1>Climate Attractor</h1>
      <div class="sub">800,000 Years · Real Ice Core Data</div>
      <div class="stats">
        <div><div class="stat-value">800K</div><div class="stat-label">years of data</div></div>
        <div class="stat-div"></div>
        <div><div class="stat-value">5</div><div class="stat-label">dimensions</div></div>
        <div class="stat-div"></div>
        <div><div class="stat-value">422</div><div class="stat-label">ppm CO₂ today</div></div>
      </div>
    </div>
    <div class="brand">climate-attractor.vercel.app</div>
  </div>
</body>
</html>
